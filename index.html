<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="TC Translate — a fast, private, multilingual AI translator. Translate text and images into tone variants, back-translate to check meaning, convert kanji and transcribe speech, using your own or a shared LLM."
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TC Translate" />
    <meta
      property="og:description"
      content="A fast, private, multilingual AI translator with tone variants, back-translation, kanji conversion and speech transcription."
    />
    <meta name="twitter:card" content="summary" />

    <title>TC Translate</title>

    <!-- Apply the saved theme before first paint to avoid a flash. Light is default. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('tc-translate-theme')
          document.documentElement.dataset.theme = stored === 'dark' ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
